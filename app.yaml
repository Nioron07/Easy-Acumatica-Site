runtime: nodejs22

# A single catch-all handler routes every request to the Nuxt/Nitro server.
# The application itself serves SSR pages, all static assets under
# .output/public (/_nuxt/*, favicons, images), and the sitemap.xml / robots.txt
# generated by the Nuxt SEO modules. Cloud Run only supports a simple root
# handler, so the per-path static handlers App Engine used have been removed —
# routing lives in application code.
handlers:
  - url: /*
    script: auto

entrypoint: npm run start # runs `node .output/server/index.mjs`

automatic_scaling:
  min_instances: 0
  max_instances: 5
